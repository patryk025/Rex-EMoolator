name: Build and Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.4.2; empty = automatic test version"
        required: false
        type: string

      draft:
        description: "Create as a draft release?"
        required: true
        default: false
        type: boolean

      prerelease:
        description: "Mark as prerelease?"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest

    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_number: ${{ steps.version.outputs.version_number }}
      release_code: ${{ steps.version.outputs.release_code }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      draft: ${{ steps.flags.outputs.draft }}
      prerelease: ${{ steps.flags.outputs.prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION_NAME="${{ inputs.version }}"
          else
            COMMIT_HASH="$(git rev-parse --short HEAD)"
            DATE="$(date -u +%Y-%m-%d)"
            VERSION_NAME="v${DATE}_${COMMIT_HASH}"
          fi

          VERSION_NUMBER="${VERSION_NAME#v}"

          # run_number as release code, no more API calls to GitHub to get the latest release number, which is rate limited
          RELEASE_CODE="${GITHUB_RUN_NUMBER}"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_number=${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "release_code=${RELEASE_CODE}" >> "$GITHUB_OUTPUT"

      - name: Resolve release flags
        id: flags
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "draft=false" >> "$GITHUB_OUTPUT"

            VERSION="${{ steps.version.outputs.version_number }}"

            if [[ "$VERSION" == 0.* || "$VERSION" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(
            git describe \
              --tags \
              --abbrev=0 \
              "${GITHUB_SHA}^" \
              2>/dev/null || true
          )"

          if [[ -n "$PREVIOUS_TAG" ]]; then
            LOG="$(git log "${PREVIOUS_TAG}..${GITHUB_SHA}" \
              --pretty=format:'- %s (`%h`)' \
              --no-merges)"
          else
            LOG="$(git log "${GITHUB_SHA}" \
              --pretty=format:'- %s (`%h`)' \
              --no-merges)"
          fi

          if [[ -z "$LOG" ]]; then
            LOG="- No user-visible changes."
          fi

          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Desktop package (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest

          - name: Linux
            os: ubuntu-latest

          - name: macOS
            os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Save JDK 21 location
        shell: bash
        run: |
          echo "JAVA_21_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot

      - name: Build desktop application with JDK 21
        shell: bash
        run: |
          ./gradlew \
            :desktop:shadowJar \
            :desktop:prepareJpackage \
            --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_21_HOME }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}
          RELEASE_VERSION_NUMBER: ${{ needs.prepare.outputs.version_number }}

      - name: Set up JDK 24 for jpackage
        uses: actions/setup-java@v5
        with:
          java-version: "24"
          distribution: temurin

      - name: Save JDK 24 location
        shell: bash
        run: |
          echo "JAVA_24_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Create native desktop installer with JDK 24
        shell: bash
        run: |
          ./gradlew \
            :desktop:jpackage \
            --no-daemon \
            -PjpackageJavaHome="${JAVA_24_HOME}" \
            -PapplicationRuntimeJavaHome="${JAVA_21_HOME}"
        env:
          JAVA_HOME: ${{ env.JAVA_21_HOME }}
          JPACKAGE_JAVA_HOME: ${{ env.JAVA_24_HOME }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}
          PACKAGE_VERSION: ${{ runner.os == 'macOS' && format('1.0.{0}', github.run_number) || needs.prepare.outputs.version_number }}
          RELEASE_VERSION_NUMBER: ${{ needs.prepare.outputs.version_number }}
          APPLICATION_RUNTIME_JAVA_HOME: ${{ env.JAVA_21_HOME }}

      - name: Normalize macOS package filename
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#v}"
          DMG="$(find desktop/build/jpackage -maxdepth 1 -name '*.dmg' -print -quit)"

          if [[ -z "$DMG" ]]; then
            echo "DMG file not found."
            exit 1
          fi

          mv "$DMG" "desktop/build/jpackage/Rex-EMoolator-${VERSION}.dmg"
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}

      - name: List generated files
        shell: bash
        run: |
          find desktop/build/jpackage -maxdepth 3 -type f -print || true

      - name: Upload desktop installer
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer-${{ runner.os }}
          path: desktop/build/jpackage/
          if-no-files-found: error
          retention-days: 7

  build-desktop-jvm:
    name: Portable JVM artifacts
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build fat JAR and distribution ZIP
        shell: bash
        run: |
          ./gradlew \
            :desktop:shadowJar \
            :desktop:distZip \
            --no-daemon
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}
          RELEASE_VERSION_NUMBER: ${{ needs.prepare.outputs.version_number }}

      - name: Upload JVM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-jvm
          path: |
            desktop/build/libs/*.jar
            !desktop/build/libs/*-thin.jar
            desktop/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7

  build-android:
    name: Android APK
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode debug keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.DEBUG_KEYSTORE_B64 }}" \
            | base64 --decode \
            > debug.keystore

      - name: Build Android APK
        shell: bash
        run: |
          ./gradlew :android:assembleDebug --no-daemon
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}
          RELEASE_VERSION_NUMBER: ${{ needs.prepare.outputs.version_number }}
          RELEASE_CODE: ${{ needs.prepare.outputs.release_code }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android
          path: android/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build-desktop
      - build-desktop-jvm
      - build-android

    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List release files
        shell: bash
        run: |
          find all-artifacts -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.version_name }}
          name: ${{ needs.prepare.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ needs.prepare.outputs.draft }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          body: ${{ needs.prepare.outputs.changelog }}
          files: all-artifacts/**/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
