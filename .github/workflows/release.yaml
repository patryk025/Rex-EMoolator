name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty for auto-generated)'
        required: false
      draft:
        description: 'Create as a Draft Release?'
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  # 1. Prepare version number and changelog
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      release_code: ${{ env.RELEASE_CODE }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate version name
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            COMMIT_HASH=$(git rev-parse --short HEAD)
            DATE=$(date +%Y-%m-%d)
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="v${DATE}_${COMMIT_HASH}"
            fi
          fi
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Get release count from GitHub
        id: get_release_count
        run: |
          COUNT=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            | jq length)
          echo "RELEASE_CODE=$((COUNT + 1))" >> $GITHUB_ENV

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  # 2. BUILDING DESKTOP: Matrix of three systems for jpackage
  build-desktop:
    needs: prepare
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Build native desktop installers
        shell: bash
        run: ./gradlew :desktop:jpackage --no-daemon
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer-${{ matrix.os }}
          path: desktop/build/jpackage/

  # 2b. JVM artefacts
  build-desktop-jvm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build fat JAR and distribution ZIP
        run: ./gradlew :desktop:shadowJar :desktop:distZip --no-daemon
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}

      - name: Upload JVM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-jvm
          path: |
            desktop/build/libs/*.jar
            !desktop/build/libs/*-thin.jar
            desktop/build/distributions/*.zip

  # 3. Android build
  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode debug keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > debug.keystore

      - name: Build Android APK
        run: ./gradlew :android:assembleDebug --no-daemon
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version_name }}
          RELEASE_CODE: ${{ needs.prepare.outputs.release_code }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-artifact
          path: android/build/outputs/apk/debug/*.apk

  # 4. Artefact publishing to GitHub Release
  publish-release:
    needs: [prepare, build-desktop, build-desktop-jvm, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-artifacts

      - name: Create and upload release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.version_name }}
          name: ${{ needs.prepare.outputs.version_name }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          body: ${{ needs.prepare.outputs.changelog }}
          prerelease: false
          files: |
            all-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
