name: Performance benchmarks

on:
  push:
    branches:
      - main
      - feat/**
      - perf/**

# github-action-benchmark pushes history to gh-pages and comments on regressions
permissions:
  contents: write

jobs:
  jmh-benchmarks:
    if: startsWith(github.event.head_commit.message, 'perf:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run JMH benchmarks
        run: ./gradlew :core:jmh -PjmhIncludeRegex='.*Benchmark.*'

      - name: Generate Markdown report from JMH JSON
        run: |
          python core/jmh_to_md.py core/build/reports/jmh/results.json > core/build/reports/jmh/results.md
          {
            echo "## JMH Benchmark Summary"
            echo
            cat core/build/reports/jmh/results.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Convert JMH JSON to benchmark-action format
        run: |
          python core/jmh_to_benchmark_json.py core/build/reports/jmh/results.json \
            > core/build/reports/jmh/benchmark.json

      - name: Upload JMH artifacts
        uses: actions/upload-artifact@v6
        with:
          name: jmh-results
          path: |
            core/build/reports/jmh/results.json
            core/build/reports/jmh/results.md
            core/build/reports/jmh/benchmark.json
          if-no-files-found: error

      - name: Store benchmark result and compare with history
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: JMH Benchmarks
          tool: 'customSmallerIsBetter'
          output-file-path: core/build/reports/jmh/benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # dedicated data branch, NOT gh-pages: Pages is served via Actions (docs.yaml),
          # so this branch is a pure history store and never touches the docs deployment
          gh-pages-branch: benchmarks
          benchmark-data-dir-path: dev/bench
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
